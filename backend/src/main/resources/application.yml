spring:
  application:
    name: claw-backend
  profiles:
    active: dev
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: true
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/claw_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 10000
    timeout: 5000ms
  
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "claw:cache:"
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
      indent-output: true

# 服务器配置
server:
  port: 9090
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  
# 自定义应用配置
app:
  # JWT 配置
  jwt:
    secret: ${JWT_SECRET_KEY:c2VjcmV0S2V5Rm9ySldUQXV0aGVudGljYXRpb25TeXN0ZW1TZWN1cml0eTIwMjQ=}
    expiration: 86400000 # 24 小时，单位毫秒
    refreshExpiration: 604800000 # 7 天，单位毫秒
    tokenPrefix: "Bearer "
    header: "Authorization"
  
  # 安全配置
  security:
    cors:
      allowed-origins: "http://localhost:3000"
      allowed-methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
    
  # 上传配置
  upload:
    max-file-size: 10MB
    max-request-size: 20MB
    allowed-extensions: ".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.txt"
  
  # API配置
  api:
    version: v1
    base-path: /api/${app.api.version}
    default-page-size: 20
    max-page-size: 100

# 日志配置
logging:
  level:
    com.claw: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/claw-backend.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  
# Spring Boot Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  info:
    env:
      enabled: true